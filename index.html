<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="content">
        <section class="section1">
            <div><img src="images/instagram mockup1.png" alt="instagram-mockup"></div>
        </section>
        <section class="section2">
            <div class="box_for_form">

                <div class="inside-form">
                    <img src="images/instagram-text.png" alt="instagram-text">
                    <form action="#">
                        <div class="form_input">
                            <input type="text" placeholder="Phone number, username, or email">
                            <input type="password" placeholder="Password">
                        </div>
                        <div class="form_submit">
                            <input type="submit" value="Log In">
                        </div>
                    </form>
                    <div class="form-alternative">
                        <div class="line-left"><hr></div>
                        <p>OR</p>
                        <div class="line-right"><hr></div>
                    </div>
                    <div class="login-facebook">
                        <div>
                            <i class="fa-brands fa-facebook-square"></i><a href="#">Log in with Facebook</a><br>
                        </div>
                        <a href="#">Forgot password?</a>
                    </div>
                </div>
            </div>
            <div class="box_for_signup">
                <p>Don't have an account?<a href="#"> Sign up</a></p>
            </div>

            <div class="get-app">
                <p>Get the app.</p>
                <div class="app-images">
                    <img src="images/app-store.png" alt="app-store">
                    <img src="images/google-play.png" alt="google-play">
                </div>
            </div>
        </section>
    </div>
</body>
</html>
